included:
  - Sources
  - Tests

excluded:
  - .build

disabled_rules:
  - trailing_comma
  - todo
  - opening_brace
  - type_body_length
  - file_length
  - function_body_length
  - cyclomatic_complexity
  - function_parameter_count
  - redundant_sendable
  - multiple_closures_with_trailing_closure
  - optional_data_string_conversion

opt_in_rules:
  - empty_count
  - closure_spacing
  - contains_over_first_not_nil
  - discouraged_optional_boolean
  - fatal_error_message
  - first_where
  - implicitly_unwrapped_optional
  - modifier_order
  - overridden_super_call
  - private_action
  - private_outlet
  - redundant_nil_coalescing
  - sorted_first_last
  - unowned_variable_capture
  - vertical_whitespace_closing_braces
  - vertical_whitespace_opening_braces

line_length:
  warning: 120
  error: 200
  ignores_urls: true
  ignores_comments: true

identifier_name:
  min_length:
    warning: 1
  excluded:
    - id
    - i
    - x
    - y

type_name:
  min_length:
    warning: 3
  max_length:
    warning: 50

nesting:
  type_level: 2
  function_level: 3
